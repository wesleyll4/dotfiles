name = "webapps"
name_pretty = "Web Apps"
icon = "chromium"

[[entries]]
text = "Adicionar Webapp"
icon = "list-add"
keywords = ["add", "novo", "criar", "webapp"]
actions = { "add" = "kitty --class floating-webapp -e zsh -c 'echo \"Nome:\"; read NAME; echo \"URL:\"; read URL; ~/.local/bin/webapp \"$NAME\" \"$URL\"; echo \"Criado! Pressione Enter.\"; read'" }

