# Adiciona uma linha em branco para respirar entre comandos
add_newline = true

# Formato do prompt (Username em azul, diretório em ciano)
format = """
[░▒▓](#3B4252)\
[  ](bg:#3B4252 fg:#88C0D0)\
[](fg:#3B4252 bg:#434C5E)\
$directory\
[${git_branch}${git_status}](fg:#434C5E bg:#4C566A)\
[${nodejs}${rust}${python}${golang}](fg:#4C566A bg:#5E81AC)\
[](fg:#5E81AC)\
\n$character"""

[directory]
style = "bg:#434C5E fg:#EBCB8B"
format = "[ $path ]($style)"
truncation_length = 3

[git_branch]
symbol = ""
style = "bg:#4C566A fg:#B48EAD"
format = '[[ $symbol $branch ]($style)]($style)'

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
