general {
    no_fade_in = false
    grace = 0
    disable_loading = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
}

# Clock
label {
    monitor =
    text = $TIME
    color = rgba(192, 202, 245, 0.9)
    font_size = 96
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

# Data
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %d de %B')"
    color = rgba(122, 162, 247, 0.7)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(122, 162, 247)
    inner_color = rgb(26, 27, 38)
    font_color = rgb(192, 202, 245)
    fade_on_empty = true
    placeholder_text = <i>senha...</i>
    hide_input = false
    check_color = rgb(122, 162, 247)
    fail_color = rgb(247, 118, 142)
    fail_text = <i>errou!</i>
    position = 0, -100
    halign = center
    valign = center
}
